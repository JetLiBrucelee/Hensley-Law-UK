kind = "web"
previewPath = "/"
title = "Theodore William Hensley - Solicitor"
version = "1.0.0"
id = "artifacts/attorney-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24032

[services.development]
run = "pnpm --filter @workspace/attorney-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/attorney-website", "run", "build" ]
publicDir = "artifacts/attorney-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24032"
BASE_PATH = "/"
